version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: diary_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: diary_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - diary_network

  # Application Server (Go Backend)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diary_backend
    ports:
      - "8080:8080" # Exposed directly if needed, otherwise Frontend proxy handles it
    environment:
      SERVER_PORT: 8080
      SERVER_MODE: release
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: diary_db
      JWT_SECRET: your-super-secret-key-change-this
      JWT_EXPIRE_HOUR: 24
      JWT_ISSUER: diary-management
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - diary_network

  # Application Client (React Frontend via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: diary_frontend
    ports:
      - "80:80" # Maps port 80 to the host machine for Web UI
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - diary_network

volumes:
  mysql_data:

networks:
  diary_network:
    driver: bridge
